<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
<!-- 하단 스타일 태그를 채워 문제를 풀어주시면 됩니다.-->
  <style>
    
    .wrap{
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    .header{
      display: flex;
      flex-direction: column;
      margin: 1px;
    }

    .header-top{
      display: flex;
      height: 150px;
    }

    #header-top1{
      width: 20%;
      border: 1px solid black;
    }
    #header-top2{
      width: 60%;
      border: 1px solid black;
    }
    #header-top3{
      width: 20%;
      border: 1px solid black;
    }

    .nav{
      border: 1px solid black;
      margin: 1px;
    }
    #menu{
      display: flex;
      gap: 15%;
      justify-content: center;
    }

    .content{
      height: 500px;
      display: flex;
      margin: 1px;
    }

    #content1{
      width: 30%;
      border: 1px solid black;
    }
    #content2{
      width: 40%;
      border: 1px solid black;
    }
    #content3{
      width: 30%;
      border: 1px solid black;
    }

    .footer{
      height: 100px;
      margin: 1px;
    }

    #footer1{
      height: 70%;
      border: 1px solid black;
    }
    #footer2{
      height: 30%;
      border: 1px solid black;
    }
  </style>
</head>

<body>
  
  <div class="wrap">


    <header class="header">

      <div class="header-top">
        <div id="header-top1"></div>
        <div id="header-top2"></div>
        <div id="header-top3"></div>
      </div>

      <nav class="nav">
        <ul id="menu">
          <li>Java</li>
          <li>Oracle</li>
          <li>HTML</li>
          <li>CSS</li>
          <li>JavaScript</li>
        </ul>
      </nav>
    </header>
    
    <section class="content">
      <div id="content1"></div>
      <div id="content2"></div>
      <div id="content3"></div>
    </section>
    <footer class="footer">
      <div id="footer1"></div>
      <div id="footer2"></div>
    </footer>
  </div>

</body>

</html>
